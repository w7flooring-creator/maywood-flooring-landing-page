name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同一分支的新 push 取消还在跑的旧 run，省额度
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check (Prettier)
        run: npx prettier --check .

      - name: Typecheck (astro check)
        run: npm run check

      - name: Test (Vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          # PUBLIC_* 是公开非敏感值（会进前端 bundle）→ 用 Variables，不用 Secrets
          PUBLIC_SANITY_PROJECT_ID: ${{ vars.PUBLIC_SANITY_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: ${{ vars.PUBLIC_SANITY_DATASET || 'production' }}
          # 只读 token（敏感）→ Secret；该 dataset 匿名读实测返回空，build 需 token（见 ADR-0003）
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
